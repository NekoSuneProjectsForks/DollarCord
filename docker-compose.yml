# DollarCord self-hosted — one command: `docker compose up -d`
# Runs the whole stack (web + realtime signaling) on a single node, with all data
# persisted to a named volume. SELF_HOSTED=true unlocks the unlimited tier.

services:
  dollarcord:
    build: .
    image: dollarcord:latest
    container_name: dollarcord
    restart: unless-stopped
    ports:
      - "3000:3000" # HTTP + WebSocket (Socket.IO). WebRTC media is peer-to-peer.
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Self-hosted = unlimited tier for every server on this node.
      SELF_HOSTED: "true"
      # Early-adopter free-forever window (before 2026-07-01). Set to your install date.
      SELF_HOST_ACTIVATED_AT: "2026-06-30T00:00:00.000Z"
      # Public URL clients reach this node at (used for CORS).
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      # SQLite + uploads live on the data volume, each server namespaced under uploads/.
      DATABASE_URL: "file:/data/db/dollarcord.db"
      UPLOAD_ROOT: "/data/uploads"
      # Optional TURN for users behind symmetric NAT (voice/video reliability):
      # NEXT_PUBLIC_TURN_URL: "turn:turn.example.com:3478"
      # NEXT_PUBLIC_TURN_USERNAME: "user"
      # NEXT_PUBLIC_TURN_CREDENTIAL: "pass"
      # Optional stream integrations:
      # TWITCH_CLIENT_ID: ""
      # TWITCH_CLIENT_SECRET: ""
    volumes:
      - dollarcord-data:/data

volumes:
  dollarcord-data:
